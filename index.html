    @keyframes hop { 0%,100%{transform:translateY(0) rotate(0deg)} 30%{transform:translateY(-14px) rotate(-8deg)} 60%{transform:translateY(-6px) rotate(4deg)} }

    @keyframes slide-in { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

    .speech-bubble.right-side::after { content:''; position:absolute; bottom:-10px; right:12px; width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-top:10px solid #84cc16; }

    .water-flood { position:fixed; top:0;left:0;right:0;bottom:0; z-index:9990; pointer-events:none; overflow:hidden; }

    .bubble { position:absolute; border-radius:50%; background:rgba(255,255,255,0.3); animation:bubble-up linear forwards; }

    .footprint { position:fixed; font-size:1.2rem; z-index:9994; pointer-events:none; animation:footprint-fade 2s ease-out forwards; }
    .confetti-piece { position:fixed; border-radius:2px; pointer-events:none; z-index:9998; animation:confetti-fall linear forwards; }
    .sleep-frog { position:fixed; bottom:20px; right:20px; z-index:997; }
    .zzz-el { position:absolute; font-family:'Boogaloo',cursive; color:#84cc16; animation:zzz 1.5s ease-out infinite; }
    .party-overlay { position:fixed; top:0;left:0;right:0;bottom:0; z-index:9993; pointer-events:none; display:flex; flex-direction:column; align-items:center; justify-content:center; }

// ── Lily Pad Game ──
const LilyPadGame = ({ onBurp }) => {
  const [flies, setFlies] = useState([]);
  const [score, setScore] = useState(0);
  const [pops, setPops] = useState([]);
  const [tongue, setTongue] = useState(null);
  const flyIdRef = useRef(0);
  const totalRef = useRef(0);
  const gameRef = useRef(null);

  useEffect(() => {
    const spawn = () => {
      const id = ++flyIdRef.current;
      const x = 8 + Math.random() * 78;
      const y = 5 + Math.random() * 48;
      const life = 2500 + Math.random() * 2500;
      setFlies(f => [...f.slice(-5), { id, x, y, speed: 0.5 + Math.random() * 0.8 }]);
      setTimeout(() => setFlies(f => f.filter(fl => fl.id !== id)), life);
    };
    spawn();
    const iv = setInterval(spawn, 2000);
    return () => clearInterval(iv);
  }, []);

  const catchFly = (fly) => {
    const frogX = 50, frogY = 62;
    const angle = Math.atan2(fly.y - frogY, fly.x - frogX) * 180 / Math.PI;
    const dist = Math.hypot(fly.x - frogX, fly.y - frogY);
    setTongue({ angle, dist, x: frogX, y: frogY });
    setTimeout(() => setTongue(null), 450);
    setFlies(f => f.filter(fl => fl.id !== fly.id));
    setScore(s => s + 1);
    totalRef.current += 1;
    const pid = Date.now();
    setPops(p => [...p, { id: pid, x: fly.x, y: fly.y }]);
    setTimeout(() => setPops(p => p.filter(pp => pp.id !== pid)), 1000);
    if (totalRef.current % 5 === 0) setTimeout(onBurp, 500);
  };

  return (
    <div id="game-area" ref={gameRef}>
      <div style={{position:'absolute',top:10,left:14,color:'rgba(255,255,255,0.35)',fontSize:'0.7rem',fontFamily:'Boogaloo,cursive'}}>tap the flies!</div>
      <div style={{position:'absolute',top:8,right:12,fontFamily:'Boogaloo,cursive',color:'#84cc16',fontSize:'1rem'}}>🪰 {score}</div>
      <div className="water-surface"/>
      <div className="lily-pad" style={{left:'calc(50% - 45px)'}}>
        <svg width="90" height="40" viewBox="0 0 90 40">
          <ellipse cx="45" cy="28" rx="42" ry="16" fill="#16a34a"/>
          <ellipse cx="45" cy="26" rx="40" ry="14" fill="#22c55e"/>
          <path d="M45 12 L45 4 L38 10 Z" fill="#16a34a"/>
          <ellipse cx="45" cy="24" rx="28" ry="9" fill="#4ade80" opacity="0.4"/>
        </svg>
        <div style={{position:'absolute',top:-52,left:'50%',transform:'translateX(-50%)'}}>
          <svg width="60" height="60" viewBox="0 0 100 100" className="float">
            <ellipse cx="50" cy="72" rx="20" ry="14" fill="#22c55e"/>
            <circle cx="50" cy="48" r="20" fill="#22c55e"/>
            <circle cx="40" cy="42" r="8" fill="white"/><circle cx="60" cy="42" r="8" fill="white"/>
            <circle cx="41" cy="42" r="4.5" fill="#1a1a1a"/><circle cx="61" cy="42" r="4.5" fill="#1a1a1a"/>
            <circle cx="42" cy="41" r="1.8" fill="white"/><circle cx="62" cy="41" r="1.8" fill="white"/>
            <path d="M43 56 Q50 60 57 56" stroke="#15803d" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
            <path d="M32 65 Q24 76 18 80" stroke="#16a34a" strokeWidth="5" strokeLinecap="round" fill="none"/>
            <path d="M68 65 Q76 76 82 80" stroke="#16a34a" strokeWidth="5" strokeLinecap="round" fill="none"/>
          </svg>
        </div>
      </div>
      {tongue && (
        <div className="tongue shooting" style={{
          left:`${tongue.x}%`, top:`${tongue.y}%`,
          width:`${tongue.dist * 1.1}px`,
          transform:`rotate(${tongue.angle}deg)`,
        }}/>
      )}
      {flies.map(fly => (
        <div key={fly.id} className="game-fly"
          style={{left:`${fly.x}%`,top:`${fly.y}%`,animationDuration:`${fly.speed}s`}}
          onClick={() => catchFly(fly)}>🪰</div>
      ))}
      {pops.map(p => (
        <div key={p.id} className="score-pop" style={{left:`${p.x}%`,top:`${p.y}%`}}>+1</div>
      ))}
      {totalRef.current > 0 && totalRef.current % 5 !== 0 && (
        <div style={{position:'absolute',bottom:76,right:10,fontSize:'0.68rem',color:'rgba(132,204,22,0.6)',fontFamily:'Boogaloo,cursive'}}>

// ── Peekaboo Frog ──
const PeekabooFrog = () => {
  const [state, setState] = useState(null);
  useEffect(() => {
    const trigger = () => {
      const side = Math.random() > 0.5 ? 'left' : 'right';
      const line = PEEK_LINES[Math.floor(Math.random() * PEEK_LINES.length)];
      setState({ side, line, phase: 'entering' });
      setTimeout(() => setState(s => s ? {...s, phase:'leaving'} : s), 3500);
      setTimeout(() => setState(null), 4100);
    };
    const t1 = setTimeout(trigger, 9000);
    const iv = setInterval(trigger, 20000 + Math.random() * 10000);
    return () => { clearTimeout(t1); clearInterval(iv); };
  }, []);
  if (!state) return null;
  return (
    <div className={`peek-frog ${state.side} ${state.phase}`}>
      {state.side === 'left' && <PeekFrogSVG flipped={false}/>}
      <div className={`speech-bubble ${state.side === 'left' ? 'left-side' : 'right-side'}`}>{state.line}</div>
      {state.side === 'right' && <PeekFrogSVG flipped={true}/>}
    </div>
  );
};

// ── Sleep Frog ──
const SleepFrog = () => {
  const [asleep, setAsleep] = useState(false);
  const timerRef = useRef(null);
  const resetTimer = useCallback(() => {
    setAsleep(false);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => setAsleep(true), 14000);
  }, []);
  useEffect(() => {
    resetTimer();
    ['mousemove','touchstart','click','keydown'].forEach(e => window.addEventListener(e, resetTimer));
    return () => {
      clearTimeout(timerRef.current);
      ['mousemove','touchstart','click','keydown'].forEach(e => window.removeEventListener(e, resetTimer));
    };
  }, [resetTimer]);
  if (!asleep) return null;
  return (
    <div className="sleep-frog">
      <div style={{position:'relative'}}>
        <SleepFrogSVG/>
        <div className="zzz-el" style={{top:-8,right:-4,fontSize:'0.9rem'}}>z</div>
        <div className="zzz-el" style={{top:-20,right:-10,fontSize:'1.1rem',animationDelay:'0.5s'}}>z</div>
        <div className="zzz-el" style={{top:-34,right:-16,fontSize:'1.4rem',animationDelay:'1s'}}>z</div>
      </div>
    </div>
  );
};

              <div style={{position:'relative',cursor:'pointer',flexShrink:0}} onClick={()=>handleFrogClick(key)}>
                <Frog size={72}/>
                {ripples[key] && <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',borderRadius:'50%',border:`3px solid ${color}`,width:60,height:60,animation:'ripple 1s ease-out forwards'}}/>}
              </div>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <div className="display-font" style={{fontSize:'1.1rem',color:'#e8f5e9'}}>{label}</div>
                  <div style={{fontSize:'0.85rem',color}}>{done} <span style={{color:'#5a8a6a'}}>/ {target}</span></div>
                </div>
                <div className="progress-track" style={{height:10}}>
                  <div className="progress-fill" style={{width:`${pct}%`,background:color}}/>
                </div>
                <button onClick={()=>logWorkout(key)} style={{
                  marginTop:6,fontSize:'0.72rem',background:'transparent',
                  border:`1px solid ${color}33`,color,borderRadius:99,
                  padding:'0.2rem 0.7rem',cursor:'pointer',fontFamily:'Boogaloo,cursive'
                }}>+ Log {label}</button>
              </div>
              <ProgressArc pct={pct} color={color} size={56}/>
            </div>
          ))}

          <div className="card">
            <div className="display-font" style={{fontSize:'1.1rem',color:'#e8f5e9',marginBottom:'0.8rem'}}>📅 This Week</div>
            <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap',marginBottom:'0.8rem'}}>
              {THIS_WEEK.days.map(d=>(
                <div key={d.day} className={`day-pill ${d.done?'done':d.today?'today':d.type==='rest'?'rest':''}`}>
                  {d.done?'✓':d.today?'→':''} {d.day}
                </div>
              ))}
            </div>
            {[
              {label:'🏊 Swim',logged:1.8,target:3,color:'#3b82f6'},
              {label:'🚴 Bike',logged:2.4,target:4,color:'#f59e0b'},
              {label:'🏃 Run',logged:1.2,target:3,color:'#ef4444'},
            ].map(({label,logged,target,color})=>(
              <div key={label} style={{marginBottom:'0.5rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.82rem',marginBottom:3}}>
                  <span style={{color:'#a3c4a3'}}>{label}</span>
                  <span style={{color}}>{logged}h <span style={{color:'#5a8a6a'}}>/ {target}h</span></span>
                </div>
                <div className="progress-track" style={{height:7}}>
                  <div className="progress-fill" style={{width:`${Math.min(100,(logged/target)*100)}%`,background:color}}/>
                </div>
              </div>
            ))}
          </div>

          <button onClick={()=>showToast(FUN_MESSAGES[Math.floor(Math.random()*FUN_MESSAGES.length)])}
            style={{width:'100%',padding:'0.9rem',borderRadius:16,background:'transparent',border:'2px dashed #2a5a2a',color:'#5a8a6a',fontFamily:'Boogaloo,cursive',fontSize:'1rem',cursor:'pointer'}}
            onMouseEnter={e=>{e.target.style.borderColor='#84cc16';e.target.style.color='#84cc16';}}
            onMouseLeave={e=>{e.target.style.borderColor='#2a5a2a';e.target.style.color='#5a8a6a';}}>
            🐸 I need some frog wisdom
          </button>
        </div>
      )}

      {/* ── TRAINING PLAN ── */}
      {tab==='training' && (
        <div className="slide-in" style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
          <div style={{color:'#5a8a6a',fontSize:'0.85rem',marginBottom:'0.4rem'}}>20-week Half Ironman plan · First 8 weeks shown</div>
          {WEEKS.map(w=>(
            <div key={w.week} className="card" style={{
              border:w.current?'2px solid #84cc16':'1px solid #1e4a4a',
              opacity:w.done&&!w.current?0.65:1,
              background:w.recovery?'#0d1f2d':w.current?'#112e1a':'#112e2e'
            }}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:'0.5rem',flexWrap:'wrap'}}>
                    <div className="display-font" style={{fontSize:'1rem',color:w.current?'#84cc16':'#e8f5e9'}}>Week {w.week}</div>
                    {w.current && <span style={{fontSize:'0.68rem',background:'#84cc16',color:'#0d2b2b',padding:'0.1rem 0.5rem',borderRadius:99,fontWeight:700}}>YOU ARE HERE</span>}
                    {w.done&&!w.current && <span style={{color:'#22c55e'}}>✓</span>}
                  </div>
                  <div style={{fontSize:'0.78rem',color:'#5a8a6a',marginTop:2}}>{w.phase}</div>
                </div>
                <div style={{display:'flex',gap:'0.6rem',fontSize:'0.8rem',flexShrink:0}}>
                  <span style={{color:'#3b82f6'}}>🏊{w.swim}h</span>
                  <span style={{color:'#f59e0b'}}>🚴{w.bike}h</span>
                  <span style={{color:'#ef4444'}}>🏃{w.run}h</span>
                </div>
              </div>
              {w.current && (
                <div style={{marginTop:'0.5rem',padding:'0.5rem',background:'#0d2b2b',borderRadius:10,fontSize:'0.78rem',color:'#84cc16'}}>
                  🐸 "This is your week. Don't blow it, frog."
                </div>
              )}
            </div>
          ))}
          <div style={{textAlign:'center',color:'#2a5a2a',padding:'1rem',fontSize:'0.85rem'}}>··· weeks 9–20 unlock as you progress ···</div>
        </div>
      )}

      {/* ── MILESTONES ── */}
      {tab==='milestones' && (
        <div className="slide-in">
          <div className="card" style={{marginBottom:'1rem',textAlign:'center'}}>
            <div className="display-font" style={{fontSize:'1.3rem',color:'#f59e0b'}}>⭐ Level 4 — Puddle Jumper</div>
            <div style={{fontSize:'0.8rem',color:'#5a8a6a',margin:'0.3rem 0 0.6rem'}}>480 / 600 XP to Level 5</div>
            <div className="xp-bar"><div className="xp-fill" style={{width:'80%'}}/></div>
          </div>

          <div className="display-font" style={{color:'#5a8a6a',fontSize:'0.8rem',letterSpacing:1,textTransform:'uppercase',marginBottom:'0.6rem'}}>Quest Badges</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.6rem',marginBottom:'1.2rem'}}>
            {milestones.map(m=>(
              <div key={m.id} className={`badge ${m.unlocked?'unlocked':'locked'}`}
                onClick={()=>!m.unlocked&&unlockBadge(m.id)}
                style={{cursor:m.unlocked?'default':'pointer'}}>
                <div style={{fontSize:'2rem'}}>{m.emoji}</div>
                <div className="display-font" style={{fontSize:'0.95rem',color:m.unlocked?'#84cc16':'#3a5a3a',textAlign:'center'}}>{m.label}</div>
                <div style={{fontSize:'0.7rem',color:'#5a8a6a',textAlign:'center',lineHeight:1.3}}>{m.desc}</div>
                {!m.unlocked && <div style={{fontSize:'0.62rem',color:'#2a4a2a',marginTop:2}}>tap to unlock</div>}
                {m.unlocked && <div style={{position:'absolute',top:8,right:8,fontSize:'0.65rem',color:'#84cc16'}}>✓</div>}
              </div>
            ))}
          </div>

          <div className="display-font" style={{color:'#5a8a6a',fontSize:'0.8rem',letterSpacing:1,textTransform:'uppercase',marginBottom:'0.6rem'}}>Your Personal Goals</div>
          <div style={{display:'flex',flexDirection:'column',gap:'0.5rem',marginBottom:'0.8rem'}}>
            {customGoals.map(g=>(
              <div key={g.id} className="card" style={{
                display:'flex',alignItems:'center',gap:'0.8rem',padding:'0.9rem 1rem',
                border:g.done?'1px solid #84cc16':'1px solid #1e4a4a',
                background:g.done?'#112e1a':'#112e2e'
              }}>
                <button onClick={()=>toggleGoal(g.id)} style={{
                  width:28,height:28,borderRadius:'50%',flexShrink:0,
                  border:`2px solid ${g.done?'#84cc16':'#2a5a2a'}`,
                  background:g.done?'#84cc16':'transparent',cursor:'pointer',
                  fontSize:'0.85rem',display:'flex',alignItems:'center',justifyContent:'center',
                  color:g.done?'#0d2b2b':'transparent'
                }}>✓</button>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:'0.4rem'}}>
                    <span style={{fontSize:'1.2rem'}}>{g.emoji}</span>
                    <span className="display-font" style={{color:g.done?'#84cc16':'#e8f5e9',textDecoration:g.done?'line-through':'none'}}>{g.label}</span>
                  </div>
                  {g.desc && <div style={{fontSize:'0.75rem',color:'#5a8a6a',marginTop:2}}>{g.desc}</div>}
                </div>
                <button onClick={()=>setCustomGoals(gs=>gs.filter(x=>x.id!==g.id))} style={{background:'transparent',border:'none',color:'#2a5a2a',cursor:'pointer',fontSize:'1rem',padding:'0.2rem',flexShrink:0}}>✕</button>
              </div>
            ))}
          </div>

          {!addingGoal ? (
            <button onClick={()=>setAddingGoal(true)} style={{
              width:'100%',padding:'0.9rem',borderRadius:16,background:'transparent',
              border:'2px dashed #2a5a2a',color:'#5a8a6a',fontFamily:'Boogaloo,cursive',
              fontSize:'1rem',cursor:'pointer'
            }}
            onMouseEnter={e=>{e.target.style.borderColor='#84cc16';e.target.style.color='#84cc16';}}
            onMouseLeave={e=>{e.target.style.borderColor='#2a5a2a';e.target.style.color='#5a8a6a';}}>
              + Add your own goal
            </button>
          ) : (
            <div className="card" style={{border:'2px solid #84cc16'}}>
              <div className="display-font" style={{color:'#84cc16',marginBottom:'0.8rem'}}>New Goal</div>
              <div style={{display:'flex',gap:'0.5rem',marginBottom:'0.5rem'}}>
                <input value={newGoal.emoji} onChange={e=>setNewGoal(g=>({...g,emoji:e.target.value}))}
                  style={{width:48,textAlign:'center',background:'#0d2b2b',border:'1px solid #2a5a2a',borderRadius:10,padding:'0.5rem',color:'#e8f5e9',fontSize:'1.2rem'}}/>
                <input placeholder="Goal name *" value={newGoal.label} onChange={e=>setNewGoal(g=>({...g,label:e.target.value}))}
                  style={{flex:1,background:'#0d2b2b',border:'1px solid #2a5a2a',borderRadius:10,padding:'0.5rem 0.8rem',color:'#e8f5e9',fontFamily:'Boogaloo,cursive',fontSize:'0.95rem'}}/>
              </div>
              <input placeholder="Description (optional)" value={newGoal.desc} onChange={e=>setNewGoal(g=>({...g,desc:e.target.value}))}
                style={{width:'100%',background:'#0d2b2b',border:'1px solid #2a5a2a',borderRadius:10,padding:'0.5rem 0.8rem',color:'#e8f5e9',fontSize:'0.85rem',marginBottom:'0.8rem'}}/>
              <div style={{display:'flex',gap:'0.5rem'}}>
                <button onClick={addGoal} style={{flex:1,padding:'0.6rem',borderRadius:10,background:'#84cc16',border:'none',color:'#0d2b2b',fontFamily:'Boogaloo,cursive',fontSize:'1rem',cursor:'pointer'}}>Add Goal 🐸</button>
                <button onClick={()=>setAddingGoal(false)} style={{padding:'0.6rem 1rem',borderRadius:10,background:'transparent',border:'1px solid #2a5a2a',color:'#5a8a6a',fontFamily:'Boogaloo,cursive',fontSize:'1rem',cursor:'pointer'}}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── STATS ── */}
      {tab==='stats' && (
        <div className="slide-in" style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.8rem'}}>
            {[
              {label:'Total Hours',value:'42.5h',icon:'⏱️',color:'#84cc16'},
              {label:'Workouts Done',value:'34',icon:'✅',color:'#22c55e'},
              {label:'Swim Distance',value:'12.4km',icon:'🏊',color:'#3b82f6'},
              {label:'Bike Distance',value:'380km',icon:'🚴',color:'#f59e0b'},
              {label:'Run Distance',value:'98km',icon:'🏃',color:'#ef4444'},
              {label:'Current Streak',value:'3 days 🔥',icon:'🔥',color:'#f97316'},
            ].map(s=>(
              <div key={s.label} className="card" style={{textAlign:'center'}}>
                <div style={{fontSize:'1.5rem',marginBottom:4}}>{s.icon}</div>
                <div className="display-font" style={{fontSize:'1.4rem',color:s.color}}>{s.value}</div>
                <div style={{fontSize:'0.75rem',color:'#5a8a6a'}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="display-font" style={{fontSize:'1rem',color:'#e8f5e9',marginBottom:'0.8rem'}}>📈 Discipline Progress</div>
            <div style={{display:'flex',justifyContent:'space-around',padding:'0.5rem 0'}}>
              {[{label:'Swim',pct:swimPct,color:'#3b82f6'},{label:'Bike',pct:bikePct,color:'#f59e0b'},{label:'Run',pct:runPct,color:'#ef4444'}].map(d=>(
                <div key={d.label} style={{textAlign:'center'}}>
                  <ProgressArc pct={d.pct} color={d.color} size={80}/>
                  <div className="display-font" style={{fontSize:'0.9rem',color:'#a3c4a3',marginTop:4}}>{d.label}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{border:'2px solid #1a3a1a'}}>
            <div style={{fontSize:'1.5rem',marginBottom:'0.5rem'}}>🐸</div>
            <div className="display-font" style={{color:'#84cc16',fontSize:'1rem',marginBottom:'0.3rem'}}>Frog Analysis</div>
            <div style={{fontSize:'0.85rem',color:'#a3c4a3',lineHeight:1.6}}>
              "Strong swim base, bike coming along nicely. Run is your weakest link — consider one more long run per week. You're on track to finish comfortably. The frog approves."
            </div>
          </div>
          <div className="card" style={{border:'2px dashed #2a5a2a'}}>
            <div className="display-font" style={{color:'#5a8a6a',marginBottom:'0.6rem',fontSize:'0.8rem',textTransform:'uppercase',letterSpacing:1}}>🎮 Preview All Surprises</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.4rem'}}>
              {[['🏊 Swim Flood','swim'],['🚴 Bike Zoom','bike'],['🏃 Run Shake','run'],['🏆 Badge Pop','badge'],['🎉 50% Party','party'],['💨 Burp','burp']].map(([label,type])=>(
                <button key={type} onClick={()=>trigger(type, type==='badge'?MILESTONES_DATA[4]:null)}
                  style={{padding:'0.5rem',borderRadius:10,background:'#0d2b2b',border:'1px solid #2a5a2a',color:'#84cc16',fontFamily:'Boogaloo,cursive',fontSize:'0.85rem',cursor:'pointer'}}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── CELEBRATIONS ── */}
      {celebration==='swim'  && <WaterFlood onDone={()=>setCelebration(null)}/>}
      {celebration==='bike'  && <BikeZoom onDone={()=>setCelebration(null)}/>}
      {celebration==='run'   && <RunCelebration onDone={()=>setCelebration(null)}/>}
      {celebration==='badge' && <BadgeCelebration badge={celebData} onDone={()=>setCelebration(null)}/>}
      {celebration==='party' && <PartyOverlay onDone={()=>setCelebration(null)}/>}
      {celebration==='burp'  && <BurpOverlay onDone={()=>setCelebration(null)}/>}

      <PeekabooFrog/>
      <SleepFrog/>

      {toast && (
        <div className="toast">
          <div style={{fontSize:'0.9rem',color:'#a3c4a3',lineHeight:1.5}}>{toast}</div>
        </div>
      )}

      <div style={{textAlign:'center',padding:'2rem 0 1rem',color:'#2a5a2a',fontSize:'0.78rem'}}>
        🐸 Poke a bitch ass frog for wisdom
      </div>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
